# GitHub Pages: nach Push auf main bauen und unter
# https://<USER>.github.io/<REPO-NAME>/ veröffentlichen
#
# Einmalig im Repo: Settings → Pages → Source: „GitHub Actions“
# Spezialfall Nutzerseite <USER>.github.io (Repo genau so benannt): base-href muss "/" sein – siehe README unten.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Production build (base-href = Repository-Name)
        run: npx ng build --configuration=production --base-href /${{ github.event.repository.name }}/

      - name: SPA refresh auf Unterpfaden (GitHub Pages 404)
        run: cp dist/clean-werk-web/browser/index.html dist/clean-werk-web/browser/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/clean-werk-web/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
